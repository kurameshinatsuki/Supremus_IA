name: Docker CI - Leurre

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: docker-ci-leurre
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Build Docker image with token
      run: |
        docker build \
          --build-arg GITHUB_TOKEN=${{ secrets.GH_TOKEN }} \
          -t bot-leurre:latest .

    - name: Run bot container
      run: |
        timeout 14520s docker run --rm \
          -e NODE_ENV=production \
          -e GH_RESTART_TOKEN=${{ secrets.GH_TOKEN }} \
          -e GITHUB_REPOSITORY=${{ github.repository }} \
          -e GH_WORKFLOW_FILE=deploy.yml \
          -e GH_WORKFLOW_REF=main \
          bot-leurre:latest